services:
  ph803w2-mqtt-bridge:
    container_name: ph803w2-mqtt-bridge
    image: topale707/ph803w2-mqtt-bridge:latest
    restart: unless-stopped

    env_file:
      - .env

    environment:
    - MQTT_HOST=${MQTT_HOST}
    - MQTT_PORT=${MQTT_PORT}
    - MQTT_USERNAME=${MQTT_USERNAME}
    - MQTT_PASSWORD=${MQTT_PASSWORD}
    - PH803W2_HOST=${PH803W2_HOST}
    - MQTT_CLIENT_ID=${MQTT_CLIENT_ID}
    - MQTT_INTERVAL=${MQTT_INTERVAL}
    - TZ=${TZ}

    # optional:
    # networks:
    #   - default

# networks:
#   default:
#     driver: bridge
