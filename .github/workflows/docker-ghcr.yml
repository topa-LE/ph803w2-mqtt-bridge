name: 🐳 Build & Push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔡 Repository Owner lowercase
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: 🔡 Repository Name lowercase
        run: echo "REPO_LC=${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]' | awk '{print "REPO_LC="$0}' >> $GITHUB_ENV

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build latest image
        if: github.ref_type == 'branch'
        run: docker build -t ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:latest .

      - name: 🚀 Push latest image
        if: github.ref_type == 'branch'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:latest

      - name: 🏷️ Build tagged image
        if: github.ref_type == 'tag'
        run: docker build -t ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:${{ github.ref_name }} .

      - name: 🚀 Push tagged image
        if: github.ref_type == 'tag'
        run: docker push ghcr.io/${{ env.OWNER_LC }}/${{ env.REPO_LC }}:${{ github.ref_name }}
