name: Docker Build + Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE_NAME_GHCR: ghcr.io/topa-le/ph803w2-mqtt-bridge
  IMAGE_NAME_DOCKERHUB: topale707/ph803w2-mqtt-bridge

jobs:
  docker:
    name: Build and Push GHCR + Docker Hub
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Repository auschecken
        uses: actions/checkout@v4

      - name: 🏗️ QEMU einrichten
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔐 Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME_GHCR }}
            ${{ env.IMAGE_NAME_DOCKERHUB }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}

      - name: 🚀 Build und Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: ✅ Ausgabe Tags
        run: |
          echo "Veröffentlichte Tags:"
          echo "${{ steps.meta.outputs.tags }}"
